project:
  title:        "8-bit Counter"
  author:       "sriram"
  description:  "A synchronous 8-bit binary counter"
  language:     "Verilog"
  clock_hz:     10000000
  tiles:        "1x1"
  top_module:   "tt_um_example"
  source_files:
    - "project.v"

pinout:
  uo[0]: "bit0"
  uo[1]: "bit1"
  uo[2]: "bit2"
  uo[3]: "bit3"
  uo[4]: "bit4"
  uo[5]: "bit5"
  uo[6]: "bit6"
  uo[7]: "bit7"
