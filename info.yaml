project:
  title:        "8-bit Binary Counter"
  author:       "sriram"
  discord:      ""      # Your discord username (optional)
  description:  "A simple synchronous 8-bit binary counter"
  language:     "Verilog"
  clock_hz:     10000000  # Example: 10 MHz (Adjust to your testing speed)

  # How many tiles your design occupies? 
  tiles: "1x1"          

  # Your top module name must match the module name in your Verilog file:
  top_module:  "tt_um_example"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. 
pinout:
  # Inputs (Not used in this design, but documented)
  ui[0]: "unused"
  ui[1]: "unused"
  ui[2]: "unused"
  ui[3]: "unused"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  # Outputs (The 8 bits of our counter)
  uo[0]: "bit0"
  uo[1]: "bit1"
  uo[2]: "bit2"
  uo[3]: "bit3"
  uo[4]: "bit4"
  uo[5]: "bit5"
  uo[6]: "bit6"
  uo[7]: "bit7"

  # Bidirectional pins (Set as inputs/unused)
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
